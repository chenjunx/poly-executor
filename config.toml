[chain]
# Polygon 主网 RPC，用于 merge_positions 等链上操作
# 建议换成 Alchemy/Infura 专用 RPC 以提高稳定性
rpc_url = "https://polygon-rpc.com"

[proxy]
# 代理地址，例如 "socks5://127.0.0.1:1080"
url = ""

[auth]
api_key     = ""
api_secret  = ""
passphrase  = ""
private_key = ""   # EIP-712 签名私钥（0x 开头）
funder      = ""   # 钱包地址

[order]
size_usdc = 10.0   # 每次套利投入的 USDC 总量

[simulation]
enabled = true    # true 时不走真实 order_ws / positions，改为本地模拟成交与仓位

[liquidity_reward]
enabled = true
file = "liquidity_reward.csv"
monitor_enabled = true
reward_estimator_enabled = false   # false 时关闭本地 Q-score 估算，不再写 liquidity_reward_scores 表

[app]
# 告警日志文件名
log_file = "alerts.log"
# 订单日志文件名
order_log_file = "orders.log"
# 资产配置文件名
assets_file = "assets.csv"
# 触发告警所需的最小套利空间：1 - (ask0 + ask1) > min_diff
min_diff = 0.01
# 单个 token 的最大价差上限（ask - bid），超过则跳过
max_spread = 0.05
# bid/ask 的有效价格区间，超出则跳过
min_price = 0.02
max_price = 0.98
# 默认订阅连接数（未配置 topic 时使用）
default_threads = 3
# 监控报告打印间隔（秒）
monitor_interval_secs = 30
sqlite_path = "/root/orders.db"
# 行情/模拟/奖励估算库；留空时默认使用 orders.db 同目录下的 market.db
market_sqlite_path = ""
# 是否将 WS 行情 tick 写入 SQLite（best_bid/ask 变化时落盘）
tick_store_enabled = false
# 是否将全量 book 快照和 last_trade_price 事件写入 SQLite
raw_store_enabled = false
# 每个主题的订阅线程数，未列出的主题使用 default_threads
[topic_threads]
# cs = 2
# sports = 4
us_iran=1